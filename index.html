<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EducaPlus</title> 
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column; /* Organiza título e círculo verticalmente */
            justify-content: center;
            align-items: center;
            background-color: #4b0082; /* Roxo */
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* Opcional: Título visual na página */
        .site-title {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Bola Amarela */
        .circle-container {
            width: 480px;
            height: 480px;
            background: #ffcc00;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.4);
            cursor: pointer;
            perspective: 2000px;
        }

        /* Container da Pilha */
        .stack-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Estilo dos Retângulos */
        .sheet {
            position: absolute;
            width: 130px;
            height: 250px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: all 0.7s cubic-bezier(0.25, 1, 0.5, 1);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: -8px 8px 20px rgba(0,0,0,0.15);
            transform-origin: center center;
        }

        /* Estado Inicial */
        .sheet:nth-child(1) { 
            background: rgba(255, 255, 255, 1); 
            z-index: 3; 
            transform: rotateX(50deg) rotateY(20deg) rotateZ(15deg) translateZ(30px);
        }
        .sheet:nth-child(2) { 
            background: rgba(255, 255, 255, 0.6); 
            backdrop-filter: blur(4px);
            z-index: 2; 
            transform: rotateX(50deg) rotateY(20deg) rotateZ(15deg) translateZ(10px) translate(-10px, 10px);
        }
        .sheet:nth-child(3) { 
            background: rgba(255, 255, 255, 0.2); 
            backdrop-filter: blur(8px);
            z-index: 1; 
            transform: rotateX(50deg) rotateY(20deg) rotateZ(15deg) translate(-20px, 20px);
        }

        /* Texto escondido */
        .sheet span, .sheet p {
            opacity: 0;
            color: #4b0082;
            font-weight: bold;
            margin: 10px 0;
            transition: opacity 0.4s;
            text-align: center;
        }

        /* Hover: Efeito de Abertura */
        .circle-container:hover .sheet {
            background: rgba(255, 255, 255, 1);
            box-shadow: 0 20px 45px rgba(0,0,0,0.3);
            transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg);
        }

        .circle-container:hover .sheet:nth-child(1) { transform: translateX(-170px) scale(1.1); }
        .circle-container:hover .sheet:nth-child(2) { transform: translateY(-15px) scale(1.2); z-index: 10; }
        .circle-container:hover .sheet:nth-child(3) { transform: translateX(170px) scale(1.1); }

        .circle-container:hover .sheet span,
        .circle-container:hover .sheet p {
            opacity: 1;
        }

        .sheet span { font-size: 3rem; }
    </style>
</head>
<body>

    <h1 class="site-title">EducaPlus</h1>

    <div class="circle-container">
        <div class="stack-wrapper">
            
            <div class="sheet">
                <span>🗂️</span>
                <p>Flashcards</p>
            </div>

            <div class="sheet">
                <span>📝</span>
                <p>Anotações</p>
            </div>

            <div class="sheet">
                <span>📖</span>
                <p>Resumo</p>
            </div>

        </div>
    </div>

</body>
</html>
